<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قهوة البدوية | Bedoun Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --brand-burgundy: #4a0404; 
            --brand-cream: #f5d5b5; 
        }
        .bg-brand { background-color: var(--brand-burgundy); }
        .text-brand { color: var(--brand-burgundy); }
        .border-brand { border-color: var(--brand-burgundy); }
        .btn-hover:hover { transform: translateY(-2px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-[#faf9f6] text-[#1a1a1a] font-sans antialiased">

    <nav class="sticky top-0 z-50 p-4 flex justify-between items-center bg-white/90 backdrop-blur-md border-b border-stone-200">
        <a href="index.html" class="flex items-center">
            <img src="logo.png.jpeg" alt="Bedoun Logo" class="h-16 w-auto">
        </a>
        <div class="space-x-8 space-x-reverse hidden md:flex font-semibold tracking-wide">
            <a href="index.html" class="text-brand border-b-2 border-brand" data-en="Home" data-ar="الرئيسية">الرئيسية</a>
            <a href="order.html" class="hover:text-brand transition" data-en="Order" data-ar="الطلب">الطلب</a>
            <a href="contact.html" class="hover:text-brand transition" data-en="Contact" data-ar="تواصل معنا">تواصل معنا</a>
        </div>
        <button onclick="toggleLanguage(this)" class="px-6 py-2 border-2 border-brand rounded-full text-brand font-bold btn-hover">English</button>
    </nav>

    <header class="container mx-auto px-6 py-16 lg:py-24 flex flex-col md:flex-row items-center gap-16">
        <div class="md:w-1/2 space-y-10">
            <div class="inline-block bg-brand/10 text-brand px-4 py-1 rounded-full text-sm font-bold tracking-widest uppercase" data-en="Premium Selection" data-ar="اختيار فاخر">اختيار فاخر</div>
            <h1 class="text-6xl lg:text-7xl font-black leading-tight" data-en="The Art of Bedouin Coffee" data-ar="فن القهوة البدوية">فن القهوة البدوية</h1>
            <p class="text-xl text-gray-600 leading-relaxed max-w-xl" data-en="Experience the legacy of taste. Our Arabic coffee is brewed for those who appreciate the finer details of heritage." data-ar="عش تجربة المذاق الأصيل. قهوتنا العربية مُعدة خصيصاً لمن يقدرون أدق تفاصيل التراث.">عش تجربة المذاق الأصيل. قهوتنا العربية مُعدة خصيصاً لمن يقدرون أدق تفاصيل التراث.</p>
            <div class="flex flex-col sm:flex-row gap-5">
                <a href="order.html" class="bg-brand text-white px-12 py-5 rounded-2xl text-lg font-bold shadow-2xl shadow-brand/30 btn-hover text-center" data-en="Order Now" data-ar="متاح طلب قهوتكم المفضله">متاح طلب قهوتكم المفضله</a>
            </div>
        </div>
        <div class="md:w-1/2 flex justify-center relative">
            <div class="absolute inset-0 bg-brand/5 rounded-full blur-3xl -z-10 h-80 w-80 m-auto"></div>
            <img src="product.png.jpg" alt="Arabic Coffee" class="w-full max-w-md rounded-[2.5rem] shadow-[0_50px_100px_-20px_rgba(74,4,4,0.3)] transform hover:scale-[1.02] transition-transform duration-500">
        </div>
    </header>

    <footer class="bg-[#1a0202] text-[#f5d5b5] py-16">
        <div class="flex flex-col items-center gap-10">
            <img src="logo.png.jpeg" alt="Logo" class="h-20 w-auto opacity-80 brightness-150">
            <div class="flex gap-12 text-sm font-bold tracking-widest uppercase">
                <a href="https://www.instagram.com/bedoun.sa" class="hover:text-white transition">Instagram</a>
                <a href="https://www.tiktok.com/@bedoun.sa" class="hover:text-white transition">TikTok</a>
                <a href="https://api.whatsapp.com/send?phone=9660535825671" class="hover:text-white transition">WhatsApp</a>
            </div>
            <div class="w-24 h-px bg-brand/30"></div>
            <p class="text-xs tracking-widest opacity-50 uppercase">© 2026 BEDOUN COFFEE • CAIRO - KSA</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
