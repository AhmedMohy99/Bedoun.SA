<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قهوة البدوية | Bedoun Coffee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --brand-burgundy: #4a0404; /* Matches logo background */
            --brand-cream: #f5d5b5;    /* Matches logo text/design */
        }
        .bg-brand { background-color: var(--brand-burgundy); }
        .text-brand { color: var(--brand-burgundy); }
        .border-brand { border-color: var(--brand-burgundy); }
        .text-cream { color: var(--brand-cream); }
    </style>
</head>
<body class="bg-stone-50 text-gray-900 font-sans">

    <nav class="sticky top-0 z-50 p-4 flex justify-between items-center bg-white shadow-sm border-b">
        <a href="index.html">
            <img src="logo.png" alt="Bedoun Logo" class="h-14 w-auto">
        </a>
        <div class="space-x-8 space-x-reverse hidden md:flex font-medium">
            <a href="index.html" class="text-brand">الرئيسية</a>
            <a href="order.html" class="hover:text-brand transition">الطلب</a>
            <a href="contact.html" class="hover:text-brand transition">تواصل معنا</a>
        </div>
        <button onclick="toggleLanguage(this)" class="px-5 py-2 border-2 border-brand rounded-full text-brand font-bold hover:bg-brand hover:text-white transition">English</button>
    </nav>

    <header class="container mx-auto px-6 py-20 flex flex-col md:flex-row items-center gap-12">
        <div class="md:w-1/2 space-y-8">
            <h1 class="text-6xl font-black leading-none" data-en="Authentic Arabic Coffee" data-ar="قهوة البدوية الأصيلة">قهوة البدوية الأصيلة</h1>
            <p class="text-xl text-gray-600 leading-relaxed" data-en="Discover the rich heritage in every cup. Meticulously crafted for a taste that moves you." data-ar="اكتشف التراث الغني في كل كوب. صُنعت بعناية فائقة لمذاق يحرك مشاعرك.">اكتشف التراث الغني في كل كوب. صُنعت بعناية فائقة لمذاق يحرك مشاعرك.</p>
            <div class="flex gap-4">
                <a href="order.html" class="bg-brand text-white px-10 py-4 rounded-xl text-lg font-bold shadow-lg hover:opacity-90 transition" data-en="Order Now" data-ar="متاح طلب قهوتكم المفضله">متاح طلب قهوتكم المفضله</a>
            </div>
        </div>
        <div class="md:w-1/2 flex justify-center">
            <img src="product.png" alt="Bedoun Arabic Coffee Bag" class="w-full max-w-sm rounded-3xl shadow-2xl border-4 border-brand">
        </div>
    </header>

    <footer class="bg-brand text-cream py-12 mt-20">
        <div class="flex flex-col items-center gap-6">
            <div class="flex gap-8">
                <a href="https://www.instagram.com/bedoun.sa" class="hover:underline text-sm font-bold uppercase">Instagram</a>
                <a href="https://www.tiktok.com/@bedoun.sa" class="hover:underline text-sm font-bold uppercase">TikTok</a>
                <a href="https://api.whatsapp.com/send?phone=9660535825671" class="hover:underline text-sm font-bold uppercase">WhatsApp</a>
            </div>
            <p class="text-xs">© 2026 قهوة البدوية. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
