<!DOCTYPE html>
<html lang="ar" dir="rtl" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedoun Coffee | بدون كوفي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --brand-brown: #956a4b;
        }
        .bg-brand { background-color: var(--brand-brown); }
        .text-brand { color: var(--brand-brown); }
        .border-brand { border-color: var(--brand-brown); }
    </style>
</head>
<body class="bg-stone-50 text-gray-800 font-sans">

    <nav class="p-6 flex justify-between items-center bg-white shadow-sm">
        <div class="font-bold text-2xl text-brand">BEDOUN</div>
        <div class="space-x-6 space-x-reverse hidden md:flex">
            <a href="index.html" class="hover:text-brand" data-en="Home" data-ar="الرئيسية">الرئيسية</a>
            <a href="order.html" class="hover:text-brand" data-en="Order" data-ar="الطلب">الطلب</a>
            <a href="contact.html" class="hover:text-brand" data-en="Contact" data-ar="تواصل معنا">تواصل معنا</a>
        </div>
        <button onclick="toggleLanguage()" class="border border-brand px-4 py-1 rounded-full text-brand hover:bg-brand hover:text-white transition">
            English
        </button>
    </nav>

    <section class="container mx-auto px-6 py-16 flex flex-col md:flex-row items-center">
        <div class="md:w-1/2 space-y-6">
            <h1 class="text-5xl font-bold leading-tight" data-en="Premium Coffee for Modern Minds" data-ar="قهوة مختصة للعقول المبدعة">قهوة مختصة للعقول المبدعة</h1>
            <p class="text-lg text-gray-600" data-en="Experience the rich, authentic taste of Bedoun. Crafted with passion." data-ar="استمتع بطعم بدون الأصيل والغني. صُنعت بكل شغف.">استمتع بطعم بدون الأصيل والغني. صُنعت بكل شغف.</p>
            <a href="order.html" class="inline-block bg-brand text-white px-8 py-3 rounded-lg text-lg font-semibold hover:opacity-90 transition" data-en="Order Now" data-ar="اطلب الآن">اطلب الآن</a>
        </div>
        <div class="md:w-1/2 mt-12 md:mt-0 flex justify-center">
            <div class="w-80 h-96 bg-stone-200 rounded-2xl flex items-center justify-center border-4 border-brand">
                <span class="text-gray-400">Product Image</span>
            </div>
        </div>
    </section>

    <footer class="bg-white border-t py-10 mt-20">
        <div class="flex justify-center space-x-8 space-x-reverse">
            <a href="https://www.instagram.com/bedoun.sa" class="text-brand font-medium">Instagram</a>
            <a href="https://www.tiktok.com/@bedoun.sa" class="text-brand font-medium">TikTok</a>
            <a href="https://api.whatsapp.com/send?phone=9660535825671" class="text-brand font-medium">WhatsApp</a>
        </div>
    </footer>

    <script>
        function toggleLanguage() {
            const html = document.getElementById('main-html');
            const btn = event.target;
            const isArabic = html.getAttribute('dir') === 'rtl';

            if (isArabic) {
                html.setAttribute('dir', 'ltr');
                html.setAttribute('lang', 'en');
                btn.innerText = 'العربية';
            } else {
                html.setAttribute('dir', 'rtl');
                html.setAttribute('lang', 'ar');
                btn.innerText = 'English';
            }

            document.querySelectorAll('[data-en]').forEach(el => {
                const textEn = el.getAttribute('data-en');
                const textAr = el.getAttribute('data-ar');
                el.innerText = isArabic ? textEn : textAr;
            });
        }
    </script>
</body>
</html>
